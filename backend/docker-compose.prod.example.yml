services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_ORIGIN: https://your-frontend-domain.com
      DATABASE_URL: postgresql://user:pass@host:5432/db?schema=public
      JWT_SECRET: replace_me_with_a_long_random_secret
      JWT_EXPIRES_IN: 7d

      S3_REGION: auto
      S3_ENDPOINT: https://<accountid>.r2.cloudflarestorage.com
      S3_BUCKET: formaluna
      S3_ACCESS_KEY_ID: replace_me
      S3_SECRET_ACCESS_KEY: replace_me
      S3_PUBLIC_BASE_URL: https://<your-public-domain-or-r2-public-url>
